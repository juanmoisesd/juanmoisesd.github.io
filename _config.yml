title: "Juan Moisés de la Serna"
subtitle: "Neurocientífico · Doctor en Psicología · Autor"
description: "Catálogo completo de libros y capítulos académicos de Juan Moisés de la Serna, neurocientífico y doctor en Psicología."
url: "https://juanmoisesd.github.io"
baseurl: ""

author:
  name: "Juan Moisés de la Serna"
  orcid: "https://orcid.org/0000-0002-8401-8018"
  researchgate: "https://www.researchgate.net/profile/Juan-Moises-De-La-Serna"
  google_scholar: "https://scholar.google.com/citations?user=TU_ID_AQUI"

languages:
  es: {name: "Español",    flag: "🇪🇸", dir: "ltr"}
  en: {name: "English",    flag: "🇬🇧", dir: "ltr"}
  fr: {name: "Français",   flag: "🇫🇷", dir: "ltr"}
  de: {name: "Deutsch",    flag: "🇩🇪", dir: "ltr"}
  pt: {name: "Português",  flag: "🇵🇹", dir: "ltr"}
  ar: {name: "العربية",    flag: "🇸🇦", dir: "rtl"}
  it: {name: "Italiano",   flag: "🇮🇹", dir: "ltr"}
  id: {name: "Indonesia",  flag: "🇮🇩", dir: "ltr"}
  ro: {name: "Română",     flag: "🇷🇴", dir: "ltr"}

collections:
  books:
    output: true
    permalink: /:lang/libros/:slug/
  chapters:
    output: true
    permalink: /:lang/capitulos/:slug/

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

defaults:
  - scope: {path: "", type: "books"}
    values: {layout: "book"}
  - scope: {path: "", type: "chapters"}
    values: {layout: "chapter"}

markdown: kramdown
encoding: utf-8
lang: es

exclude:
  - Gemfile
  - Gemfile.lock
  - "*.py"
  - "*.csv"
  - README.md
  - node_modules
