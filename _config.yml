title: "Juan Moisés de la Serna"
subtitle: "Neurocientífico · Doctor en Psicología · Autor"
description: "Catálogo completo de libros y publicaciones académicas de Juan Moisés de la Serna, neurocientífico y doctor en Psicología."
url: "https://juanmoises-de-la-serna.github.io"
baseurl: ""

author:
  name: "Juan Moisés de la Serna"
  orcid: "https://orcid.org/0000-0002-8401-8018"
  researchgate: "https://www.researchgate.net/profile/Juan-Moises-De-La-Serna"
  google_scholar: "https://scholar.google.com/citations?user=TU_ID_AQUI"

# Colecciones
collections:
  books:
    output: true
    permalink: /libros/:slug/
  chapters:
    output: true
    permalink: /capitulos/:slug/

# Paginación
paginate: 20
paginate_path: "/libros/pagina/:num/"

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag


# Defaults por tipo
defaults:
  - scope:
      path: ""
      type: "books"
    values:
      layout: "book"
  - scope:
      path: ""
      type: "chapters"
    values:
      layout: "chapter"

# Build
markdown: kramdown
highlighter: rouge
encoding: utf-8
lang: es

# SEO
twitter:
  username: juanmoisesdelaserna
social:
  name: "Juan Moisés de la Serna"
  links:
    - "https://orcid.org/0000-0002-8401-8018"
    - "https://www.researchgate.net/profile/Juan-Moises-De-La-Serna"

# Excluir de build
exclude:
  - Gemfile
  - Gemfile.lock
  - generar_sitio.py
  - "*.csv"
  - README.md
  - node_modules
