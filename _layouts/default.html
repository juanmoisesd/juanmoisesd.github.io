<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'es' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
  <meta name="author" content="{{ site.author.name }}">

  <!-- Canonical -->
  <link rel="canonical" href="{{ site.url }}{{ page.url }}">

  <!-- Open Graph -->
  <meta property="og:type" content="book">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta property="og:site_name" content="{{ site.title }}">

  <!-- Sitemap -->
  <link rel="sitemap" type="application/xml" href="/sitemap.xml">

  <!-- Tipografía académica con carácter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <!-- schema.org Person (global) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "@id": "{{ site.author.orcid }}",
    "name": "{{ site.author.name }}",
    "identifier": "{{ site.author.orcid }}",
    "url": "{{ site.url }}",
    "sameAs": [
      "{{ site.author.orcid }}",
      "{{ site.author.researchgate }}",
      "{{ site.author.google_scholar }}"
    ],
    "jobTitle": "Neurocientífico y Doctor en Psicología",
    "knowsAbout": ["Neurociencia","Psicología clínica","Salud mental","Ciberpsicología","Comportamiento humano"]
  }
  </script>

  {{ content_for_head }}
</head>
<body>

  <header class="site-header">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="site-logo">
        <span class="logo-initials">JM</span>
        <div class="logo-text">
          <strong>Juan Moisés de la Serna</strong>
          <span>Neurocientífico · Doctor en Psicología</span>
        </div>
      </a>
      <nav class="site-nav">
        <a href="{{ '/libros/' | relative_url }}">Libros</a>
        <a href="{{ '/capitulos/' | relative_url }}">Capítulos</a>
        <a href="{{ site.author.researchgate }}" target="_blank" rel="noopener">ResearchGate ↗</a>
        <a href="{{ site.author.orcid }}" target="_blank" rel="noopener">ORCID ↗</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>
        <strong>{{ site.author.name }}</strong> ·
        <a href="{{ site.author.orcid }}" target="_blank">ORCID</a> ·
        <a href="{{ site.author.researchgate }}" target="_blank">ResearchGate</a> ·
        <a href="{{ site.author.google_scholar }}" target="_blank">Google Scholar</a>
      </p>
      <p class="footer-note">Catálogo académico actualizado · Datos verificados desde ResearchGate y OpenAlex</p>
    </div>
  </footer>

</body>
</html>
